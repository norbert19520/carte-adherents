<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Carte Adhérents CFDT - Corrèze (19)</title>
    <style>
        #carte-correze { 
            width: 100%; 
            height: 500px; 
            border: 2px solid #2E8B57;
        }
        .titre-correze {
            color: #2E8B57;
            text-align: center;
            font-family: Arial, sans-serif;
            font-size: 1.2em;
        }
        
        /* FORMULAIRE STYLE */
        .formulaire-ajout {
            background: #f9f9f9;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        .formulaire-ajout input, .formulaire-ajout textarea {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .formulaire-ajout label {
            font-weight: bold;
            color: #2E8B57;
            font-size: 13px;
        }
        
        /* BOUTONS ACTION */
        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        button {
            margin: 3px 0;
            padding: 10px 12px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }
        .btn-ajouter { background: #2E8B57; color: white; }
        .btn-exporter { background: #2196F3; color: white; }
        .btn-importer { background: #4CAF50; color: white; }
        .btn-supprimer { background: #f44336; color: white; }
        .btn-edit { background: #FF9800; color: white; }
        .btn-excel { background: #217346 !important; color: white !important; }
        
        /* PANEL DE PERSONNALISATION */
        .config-panel {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            border-left: 4px solid #2E8B57;
        }
        .config-section {
            margin: 10px 0;
            padding: 8px;
            background: white;
            border-radius: 5px;
        }
        .color-preview {
            width: 25px;
            height: 25px;
            display: inline-block;
            border: 1px solid #ccc;
            vertical-align: middle;
            margin: 0 5px;
        }
        input[type="range"] { width: 120px; }
        .config-button {
            background: #FF9800;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            margin: 5px;
            border-radius: 4px;
        }
        
        /* LEGENDE ET CONTROLES */
        .legende {
            background: #f9f9f9;
            padding: 8px;
            margin: 8px 0;
            border-left: 4px solid #2E8B57;
            font-size: 12px;
        }
        .controls {
            background: white;
            padding: 8px;
            margin: 10px 0;
            border-radius: 5px;
            box-shadow: 0 0 5px #ccc;
        }
        
        .zoom-controls {
            text-align: center;
            margin: 10px 0;
            padding: 8px;
            background: #f0f8ff;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        
        .info-panel {
            background: white;
            padding: 8px;
            border-radius: 5px;
            border: 2px solid #2E8B57;
            font-size: 11px;
        }
        
        .convertisseur-link {
            text-align: center;
            margin-top: 10px;
            padding: 8px;
            background: #f9f9f9;
            border-radius: 5px;
        }
        
        .inline-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin: 5px 0;
        }
        
        .config-buttons {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        
        #importFile { display: none; }
        
        /* Stats */
        .stats-container {
            background: #e8f4f8;
            padding: 8px;
            margin: 8px 0;
            border-radius: 5px;
            font-size: 11px;
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .action-buttons button {
                flex: 1;
                justify-content: center;
            }
            .inline-row {
                flex-direction: column;
                align-items: flex-start;
            }
            .zoom-controls button {
                padding: 6px 10px;
                font-size: 11px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <h1 class="titre-correze"><i class="fas fa-map-marked-alt"></i> Carte des Adhérents CFDT en Corrèze (19)</h1>
    
    <div class="legende">
        <i class="fas fa-info-circle"></i> <strong>Gérez vos adhérents CFDT</strong><br>
        Département : Corrèze (19) - Nouvelle-Aquitaine
    </div>
    
    <!-- CARTE -->
    <div id="carte-correze"></div>
    
    <!-- CONTROLES DE ZOOM -->
    <div class="zoom-controls">
        <strong><i class="fas fa-crosshairs"></i> Zoom :</strong>
        <button onclick="zoomVille('Tulle')"><i class="fas fa-city"></i> Tulle</button>
        <button onclick="zoomVille('Brive')"><i class="fas fa-city"></i> Brive</button>
        <button onclick="zoomVille('Ussel')"><i class="fas fa-city"></i> Ussel</button>
        <button onclick="zoomDepartement()"><i class="fas fa-globe-europe"></i> Département</button>
    </div>
    
    <!-- STATISTIQUES -->
    <div class="stats-container">
        <strong><i class="fas fa-chart-bar"></i> Statistiques :</strong>
        <span id="stats">Chargement...</span>
    </div>
    
    <!-- CONTROLES FOND DE CARTE -->
    <div class="controls">
        <strong><i class="fas fa-palette"></i> Fond de carte :</strong>
        <button onclick="changerCarte('chaud')"><i class="fas fa-map"></i> Coloré</button>
        <button onclick="changerCarte('osm')"><i class="fas fa-road"></i> Standard</button>
        <button onclick="changerCarte('satellite')"><i class="fas fa-satellite"></i> Satellite</button>
        
        <hr style="margin: 8px 0;">
        
        <strong><i class="fas fa-search"></i> Rechercher :</strong><br>
        <input type="text" id="recherche" placeholder="Nom ou ville..." style="width: 100%; padding: 6px; margin: 5px 0; box-sizing: border-box;">
        <button onclick="rechercherPoint()" style="width: 100%;"><i class="fas fa-search"></i> Chercher</button>
    </div>
    
    <!-- FORMULAIRE D'AJOUT/MODIFICATION -->
    <div class="formulaire-ajout">
        <h3 style="color: #2E8B57; margin-top: 0;">
            <i class="fas fa-plus-circle"></i> Ajouter/Modifier un point
        </h3>
        
        <div>
            <label for="nomEHPAD">Nom/Ville *</label>
            <input type="text" id="nomEHPAD" placeholder="Ex: Section CFDT Brive">
        </div>
        <div>
            <label for="villeEHPAD">Ville *</label>
            <input type="text" id="villeEHPAD" placeholder="Ex: Brive-la-Gaillarde">
        </div>
        <div>
            <label for="adresseEHPAD">Adresse complète</label>
            <input type="text" id="adresseEHPAD" placeholder="Ex: 10 Rue des Tilleuls">
        </div>
        <div>
            <label for="adherentsEHPAD">Nombre d'adhérents *</label>
            <input type="number" id="adherentsEHPAD" placeholder="Ex: 25">
        </div>
        <div>
            <label for="latEHPAD">Latitude *</label>
            <input type="text" id="latEHPAD" placeholder="Ex: 45.267">
        </div>
        <div>
            <label for="lngEHPAD">Longitude *</label>
            <input type="text" id="lngEHPAD" placeholder="Ex: 1.767">
        </div>
        <div>
            <label for="descEHPAD">Description (optionnel)</label>
            <textarea id="descEHPAD" placeholder="Informations complémentaires..." rows="2"></textarea>
        </div>
        
        <div class="action-buttons">
            <button class="btn-ajouter" id="btn-ajouter" onclick="ajouterPoint()">
                <i class="fas fa-plus"></i> Ajouter
            </button>
            <button class="btn-ajouter" onclick="mettreAJourPoint()" style="display:none;" id="btn-update">
                <i class="fas fa-save"></i> Mettre à jour
            </button>
            <button class="btn-supprimer" onclick="annulerEdition()" style="display:none;" id="btn-cancel">
                <i class="fas fa-times"></i> Annuler
            </button>
            <button class="btn-exporter" onclick="exporterDonnees()">
                <i class="fas fa-download"></i> JSON
            </button>
            <button class="btn-excel" onclick="convertirEnCSVExcel()">
                <i class="fas fa-file-excel"></i> CSV
            </button>
        </div>
        
        <p style="font-size: 11px; color: #666; margin-top: 8px;">
            <i class="fas fa-info-circle"></i> Cliquez sur la carte pour obtenir les coordonnées
        </p>
    </div>
    
    <!-- PANEL DE PERSONNALISATION (simplifié) -->
    <div class="config-panel">
        <h3 style="color: #2E8B57; margin:0 0 8px 0;"><i class="fas fa-palette"></i> Personnalisation</h3>
        <div class="inline-row">
            <label>Couleur :</label>
            <input type="color" id="iconColor" value="#FF9800">
            <button class="config-button" onclick="appliquerPersonnalisation()" style="padding: 5px 10px;">Appliquer</button>
        </div>
    </div>

    <input type="file" id="importFile" accept=".json">

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // =============================================
        // DONNÉES DES ADHÉRENTS
        // =============================================
        var pointsAdherents = [
            {id: 1, nom: "ALBUSSAC", ville: "ALBUSSAC", adherents: 3, lat: 45.1395791, lng: 1.8356481, adresse: "", description: ""},
            {id: 2, nom: "ALLASSAC", ville: "ALLASSAC", adherents: 1, lat: 45.2593, lng: 1.4757, adresse: "", description: ""},
            {id: 3, nom: "ARGENTAT", ville: "ARGENTAT SUR DORDOGNE", adherents: 3, lat: 45.1165803, lng: 1.9404253, adresse: "", description: ""},
            {id: 4, nom: "ARNAC POMPADOUR", ville: "ARNAC POMPADOUR", adherents: 1, lat: 45.399475, lng: 1.3733, adresse: "", description: ""},
            {id: 5, nom: "BEAULIEU", ville: "BEAULIEU SUR DORDOGNE", adherents: 1, lat: 44.9782193, lng: 1.8377313, adresse: "", description: ""},
            {id: 6, nom: "BRIVE", ville: "BRIVE LA GAILLARDE", adherents: 16, lat: 45.1584982, lng: 1.5332389, adresse: "", description: ""},
            {id: 7, nom: "BEYNAT", ville: "BEYNAT", adherents: 1, lat: 45.148912, lng: 1.7218235, adresse: "", description: ""},
            {id: 8, nom: "CARS", ville: "CARS", adherents: 1, lat: 45.215731, lng: 1.59956, adresse: "", description: ""},
            {id: 9, nom: "CHAMBOULIVE", ville: "CHAMBOULIVE", adherents: 1, lat: 45.42307, lng: 1.67435, adresse: "", description: ""},
            {id: 10, nom: "CHAMEYRAT", ville: "CHAMEYRAT", adherents: 1, lat: 45.2335546, lng: 1.6974158, adresse: "", description: ""},
            {id: 11, nom: "CHAMPAGNAC", ville: "CHAMPAGNAC LA NOAILLE", adherents: 1, lat: 45.3073963, lng: 2.0168176, adresse: "", description: ""},
            {id: 12, nom: "COSNAC", ville: "COSNAC", adherents: 3, lat: 45.1331, lng: 1.58763, adresse: "", description: ""},
            {id: 13, nom: "CRESSENSAC", ville: "CRESSENSAC SARRAZAC", adherents: 1, lat: 45.202577, lng: 1.519831, adresse: "", description: ""},
            {id: 14, nom: "CUBLAC", ville: "CUBLAC", adherents: 1, lat: 45.1442316, lng: 1.3056983, adresse: "", description: ""},
            {id: 15, nom: "EGLETONS", ville: "EGLETONS", adherents: 3, lat: 45.4065523, lng: 2.042, adresse: "", description: ""},
            {id: 16, nom: "HAUTEFAGE", ville: "HAUTEFAGE", adherents: 1, lat: 45.0816106, lng: 2.001341, adresse: "", description: ""},
            {id: 17, nom: "JUGEALS NAZARETH", ville: "JUGEALS NAZARETH", adherents: 1, lat: 45.0812305, lng: 1.5585602, adresse: "", description: ""},
            {id: 18, nom: "LAGARDE MARC LA TOUR", ville: "LAGARDE MARC LA TOUR", adherents: 1, lat: 45.1908046, lng: 1.830412, adresse: "", description: ""},
            {id: 19, nom: "MALEMORT", ville: "MALEMORT", adherents: 4, lat: 45.179675, lng: 1.533, adresse: "", description: ""},
            {id: 20, nom: "NAVES", ville: "NAVES", adherents: 1, lat: 45.312139, lng: 1.7664774, adresse: "", description: ""},
            {id: 21, nom: "OBJAT", ville: "OBJAT", adherents: 1, lat: 45.2628546, lng: 1.4097899, adresse: "", description: ""},
            {id: 22, nom: "PANDRIGNES", ville: "PANDRIGNES", adherents: 2, lat: 45.2281323, lng: 1.8547415, adresse: "", description: ""},
            {id: 23, nom: "SADROC", ville: "SADROC", adherents: 1, lat: 45.2828668, lng: 1.5492086, adresse: "", description: ""},
            {id: 24, nom: "ST PANTALEON", ville: "ST PANTALEON DE LARCHE", adherents: 3, lat: 45.1406943, lng: 1.446519, adresse: "", description: ""},
            {id: 25, nom: "TULLE", ville: "TULLE", adherents: 1, lat: 45.2678347, lng: 1.7706797, adresse: "", description: ""}
        ];

        // =============================================
        // VARIABLES GLOBALES
        // =============================================
        var carte;
        var fondCarteActuel;
        var marqueurs = [];
        var centreCorreze = [45.20, 1.80];
        var zoomDepartementCorreze = 9;
        var dernierId = 25;
        var configPersonnalisation = {
            icone: { couleur: "#FF9800", taille: 24, texteCouleur: "#FFFFFF", texte: "CFDT" }
        };

        // =============================================
        // 1. INITIALISATION DE LA CARTE
        // =============================================
        function initialiserCarte() {
            console.log("Initialisation de la carte...");
            
            // Vérifier que Leaflet est chargé
            if (typeof L === 'undefined') {
                console.error("Leaflet non chargé !");
                setTimeout(initialiserCarte, 500);
                return;
            }
            
            // Créer la carte
            carte = L.map('carte-correze').setView(centreCorreze, zoomDepartementCorreze);
            
            // Fond par défaut
            changerCarte('chaud');
            
            // Ajouter les points
            ajouterPointsSurCarte();
            
            // Ajouter le clic sur la carte pour récupérer les coordonnées
            carte.on('click', function(e) {
                document.getElementById('latEHPAD').value = e.latlng.lat.toFixed(6);
                document.getElementById('lngEHPAD').value = e.latlng.lng.toFixed(6);
                
                // Tentative de reverse geocoding
                fetch(`https://nominatim.openstreetmap.org/reverse?lat=${e.latlng.lat}&lon=${e.latlng.lng}&format=json`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.address) {
                            var ville = data.address.city || data.address.town || data.address.village || "";
                            var codePostal = data.address.postcode || "";
                            if (ville) document.getElementById('villeEHPAD').value = ville;
                        }
                    })
                    .catch(err => console.log("Erreur géocodage:", err));
            });
            
            // Ajouter écoutes sur les sliders
            document.getElementById('iconSize').addEventListener('input', function() {
                document.getElementById('iconSizeValue').textContent = this.value + 'px';
            });
            
            mettreAJourStats();
            console.log("Carte initialisée avec", pointsAdherents.length, "points");
        }
        
        // =============================================
        // 2. CHANGER LE FOND DE CARTE
        // =============================================
        function changerCarte(type) {
            if (fondCarteActuel && carte) {
                carte.removeLayer(fondCarteActuel);
            }
            
            var layer;
            switch(type) {
                case 'chaud':
                    layer = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap France | CFDT Corrèze'
                    });
                    break;
                case 'osm':
                    layer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap'
                    });
                    break;
                case 'satellite':
                    layer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                        attribution: '© Esri'
                    });
                    break;
                default:
                    layer = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap France'
                    });
            }
            
            fondCarteActuel = layer;
            if (carte) layer.addTo(carte);
        }
        
        // =============================================
        // 3. CRÉATION D'ICÔNE PERSONNALISÉE
        // =============================================
        function creerIconePersonnalisee() {
            var taille = configPersonnalisation.icone.taille;
            var couleur = configPersonnalisation.icone.couleur;
            var texteCouleur = configPersonnalisation.icone.texteCouleur;
            var texte = configPersonnalisation.icone.texte;
            
            return L.divIcon({
                html: '<div style="' +
                    'width: ' + taille + 'px;' +
                    'height: ' + taille + 'px;' +
                    'background: ' + couleur + ';' +
                    'color: ' + texteCouleur + ';' +
                    'border-radius: 50%;' +
                    'border: 2px solid white;' +
                    'box-shadow: 0 0 5px rgba(0,0,0,0.5);' +
                    'display: flex;' +
                    'align-items: center;' +
                    'justify-content: center;' +
                    'font-weight: bold;' +
                    'font-size: ' + Math.max(8, taille/3) + 'px;' +
                    'font-family: Arial, sans-serif;' +
                    'text-align: center;' +
                    '">' + texte + '</div>',
                className: 'icone-cfdt',
                iconSize: [taille + 4, taille + 4],
                popupAnchor: [0, -taille/2]
            });
        }
        
        // =============================================
        // 4. CRÉATION DU CONTENU POPUP
        // =============================================
        function creerContenuPopup(point) {
            return '<div style="min-width: 200px;">' +
                '<h3 style="color: #FF9800; margin:0 0 5px 0;">' + (point.nom || '') + '</h3>' +
                '<p><strong>📍 Adresse :</strong> ' + (point.adresse || 'Non renseignée') + '</p>' +
                '<p><strong>👥 Adhérents :</strong> <span style="color:#FF9800; font-weight:bold;">' + (point.adherents || 0) + '</span></p>' +
                '<p><strong>🏙️ Ville :</strong> ' + (point.ville || '') + '</p>' +
                (point.description ? '<p><strong>ℹ️ Description :</strong> ' + point.description + '</p>' : '') +
                '<hr style="margin:8px 0;">' +
                '<button onclick="modifierPopup(' + point.id + ')" style="background:#FF9800; color:white; border:none; padding:5px 10px; border-radius:3px; cursor:pointer; margin-right:5px;">✏️ Modifier</button>' +
                '<button onclick="supprimerPoint(' + point.id + ')" style="background:#f44336; color:white; border:none; padding:5px 10px; border-radius:3px; cursor:pointer;">🗑️ Supprimer</button>' +
                '</div>';
        }
        
        // =============================================
        // 5. AJOUTER TOUS LES POINTS SUR LA CARTE
        // =============================================
        function ajouterPointsSurCarte() {
            if (!carte) return;
            
            // Supprimer les anciens marqueurs
            marqueurs.forEach(function(m) {
                if (carte.hasLayer(m)) carte.removeLayer(m);
            });
            marqueurs = [];
            
            // Ajouter les nouveaux
            pointsAdherents.forEach(function(point) {
                var icone = creerIconePersonnalisee();
                var marqueur = L.marker([point.lat, point.lng], { icon: icone })
                    .bindPopup(creerContenuPopup(point))
                    .addTo(carte);
                marqueur.pointData = point;
                marqueurs.push(marqueur);
            });
            
            // Mettre à jour le compteur
            document.getElementById('compteur-points').textContent = pointsAdherents.length;
            mettreAJourStats();
        }
        
        // =============================================
        // 6. APPLIQUER PERSONNALISATION
        // =============================================
        function appliquerPersonnalisation() {
            configPersonnalisation.icone.couleur = document.getElementById('iconColor').value;
            configPersonnalisation.icone.taille = parseInt(document.getElementById('iconSize').value) || 24;
            configPersonnalisation.icone.texteCouleur = document.getElementById('textColor').value;
            configPersonnalisation.icone.texte = document.getElementById('iconText').value || "CFDT";
            
            ajouterPointsSurCarte();
            sauvegarderDonnees();
        }
        
        // =============================================
        // 7. AJOUTER UN POINT
        // =============================================
        function ajouterPoint() {
            var nom = document.getElementById('nomEHPAD').value.trim();
            var ville = document.getElementById('villeEHPAD').value.trim();
            var adresse = document.getElementById('adresseEHPAD').value.trim();
            var adherents = parseInt(document.getElementById('adherentsEHPAD').value);
            var lat = parseFloat(document.getElementById('latEHPAD').value);
            var lng = parseFloat(document.getElementById('lngEHPAD').value);
            var description = document.getElementById('descEHPAD').value.trim();
            
            if (!nom) { alert("Le nom est obligatoire"); return; }
            if (!ville) { alert("La ville est obligatoire"); return; }
            if (isNaN(adherents)) { alert("Le nombre d'adhérents est obligatoire"); return; }
            if (isNaN(lat) || isNaN(lng)) { alert("Les coordonnées sont obligatoires"); return; }
            
            dernierId++;
            var nouveauPoint = {
                id: dernierId,
                nom: nom,
                ville: ville,
                adresse: adresse,
                adherents: adherents,
                lat: lat,
                lng: lng,
                description: description
            };
            
            pointsAdherents.push(nouveauPoint);
            ajouterPointsSurCarte();
            sauvegarderDonnees();
            reinitialiserFormulaire();
            
            alert("✅ Point ajouté !");
            carte.setView([lat, lng], 13);
        }
        
        // =============================================
        // 8. MODIFIER UN POINT
        // =============================================
        window.modifierPopup = function(id) {
            var point = pointsAdherents.find(p => p.id === id);
            if (!point) return;
            
            document.getElementById('nomEHPAD').value = point.nom;
            document.getElementById('villeEHPAD').value = point.ville;
            document.getElementById('adresseEHPAD').value = point.adresse || '';
            document.getElementById('adherentsEHPAD').value = point.adherents;
            document.getElementById('latEHPAD').value = point.lat;
            document.getElementById('lngEHPAD').value = point.lng;
            document.getElementById('descEHPAD').value = point.description || '';
            
            document.getElementById('btn-ajouter').style.display = 'none';
            document.getElementById('btn-update').style.display = 'inline-block';
            document.getElementById('btn-cancel').style.display = 'inline-block';
            document.getElementById('btn-update').setAttribute('data-point-id', id);
            
            carte.closePopup();
            carte.setView([point.lat, point.lng], 13);
        };
        
        function mettreAJourPoint() {
            var pointId = parseInt(document.getElementById('btn-update').getAttribute('data-point-id'));
            var index = pointsAdherents.findIndex(p => p.id === pointId);
            
            if (index !== -1) {
                pointsAdherents[index] = {
                    id: pointId,
                    nom: document.getElementById('nomEHPAD').value.trim(),
                    ville: document.getElementById('villeEHPAD').value.trim(),
                    adresse: document.getElementById('adresseEHPAD').value.trim(),
                    adherents: parseInt(document.getElementById('adherentsEHPAD').value),
                    lat: parseFloat(document.getElementById('latEHPAD').value),
                    lng: parseFloat(document.getElementById('lngEHPAD').value),
                    description: document.getElementById('descEHPAD').value.trim()
                };
                
                ajouterPointsSurCarte();
                sauvegarderDonnees();
                reinitialiserFormulaire();
                alert("Point mis à jour !");
            }
        }
        
        function annulerEdition() {
            reinitialiserFormulaire();
        }
        
        function reinitialiserFormulaire() {
            document.getElementById('nomEHPAD').value = '';
            document.getElementById('villeEHPAD').value = '';
            document.getElementById('adresseEHPAD').value = '';
            document.getElementById('adherentsEHPAD').value = '';
            document.getElementById('latEHPAD').value = '';
            document.getElementById('lngEHPAD').value = '';
            document.getElementById('descEHPAD').value = '';
            
            document.getElementById('btn-ajouter').style.display = 'inline-block';
            document.getElementById('btn-update').style.display = 'none';
            document.getElementById('btn-cancel').style.display = 'none';
        }
        
        // =============================================
        // 9. SUPPRIMER UN POINT
        // =============================================
        window.supprimerPoint = function(id) {
            if (confirm("Supprimer ce point ?")) {
                pointsAdherents = pointsAdherents.filter(p => p.id !== id);
                ajouterPointsSurCarte();
                sauvegarderDonnees();
                mettreAJourStats();
                alert("Point supprimé !");
            }
        };
        
        // =============================================
        // 10. RECHERCHE
        // =============================================
        function rechercherPoint() {
            var recherche = document.getElementById('recherche').value.toLowerCase();
            if (!recherche) return;
            
            var trouve = false;
            marqueurs.forEach(function(m) {
                var nom = (m.pointData.nom || '').toLowerCase();
                var ville = (m.pointData.ville || '').toLowerCase();
                if (nom.includes(recherche) || ville.includes(recherche)) {
                    carte.setView([m.pointData.lat, m.pointData.lng], 13);
                    m.openPopup();
                    trouve = true;
                }
            });
            
            if (!trouve) alert("Aucun point trouvé : " + recherche);
        }
        
        // =============================================
        // 11. ZOOM
        // =============================================
        function zoomVille(nomVille) {
            var coords = {
                'Tulle': [45.2678347, 1.7706797],
                'Brive': [45.1584982, 1.5332389],
                'Ussel': [45.548, 2.309]
            };
            if (coords[nomVille]) {
                carte.setView(coords[nomVille], 13);
            }
        }
        
        function zoomDepartement() {
            carte.setView(centreCorreze, zoomDepartementCorreze);
        }
        
        // =============================================
        // 12. STATISTIQUES
        // =============================================
        function mettreAJourStats() {
            var total = pointsAdherents.length;
            var totalAdherents = pointsAdherents.reduce((sum, p) => sum + (parseInt(p.adherents) || 0), 0);
            var moyenne = total > 0 ? (totalAdherents / total).toFixed(1) : 0;
            
            document.getElementById('stats').innerHTML = total + ' points | Total: ' + totalAdherents + ' adh. | Moyenne: ' + moyenne;
        }
        
        // =============================================
        // 13. SAUVEGARDE / CHARGEMENT
        // =============================================
        function sauvegarderDonnees() {
            var donnees = { points: pointsAdherents, dernierId: dernierId, config: configPersonnalisation };
            localStorage.setItem('carteCFDTCorreze', JSON.stringify(donnees));
        }
        
        function chargerDonnees() {
            var saved = localStorage.getItem('carteCFDTCorreze');
            if (saved) {
                try {
                    var data = JSON.parse(saved);
                    if (data.points && data.points.length) {
                        pointsAdherents = data.points;
                        dernierId = data.dernierId;
                    }
                    if (data.config) configPersonnalisation = data.config;
                } catch(e) {}
            }
        }
        
        // =============================================
        // 14. EXPORT / IMPORT
        // =============================================
        function exporterDonnees() {
            var blob = new Blob([JSON.stringify({points: pointsAdherents}, null, 2)], {type: 'application/json'});
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'cfdt-correze-' + new Date().toISOString().slice(0,10) + '.json';
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function convertirEnCSVExcel() {
            if (!pointsAdherents.length) { alert("Aucune donnée"); return; }
            
            var csv = "ID;Nom;Ville;Adresse;Adhérents;Latitude;Longitude;Description\r\n";
            pointsAdherents.forEach(p => {
                csv += p.id + ";" + (p.nom || "") + ";" + (p.ville || "") + ";" + (p.adresse || "") + ";" + 
                       (p.adherents || 0) + ";" + (p.lat || "") + ";" + (p.lng || "") + ";" + (p.description || "").replace(/;/g, ',') + "\r\n";
            });
            
            var blob = new Blob(["\uFEFF" + csv], {type: 'text/csv;charset=utf-8;'});
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'adherents-cfdt-' + new Date().toISOString().slice(0,10) + '.csv';
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // =============================================
        // INITIALISATION
        // =============================================
        // Ajouter les écouteurs manquants
        document.addEventListener('DOMContentLoaded', function() {
            // Ajouter le slider taille icône s'il n'existe pas
            var configSection = document.querySelector('.config-panel .inline-row');
            if (configSection && !document.getElementById('iconSize')) {
                var sizeHtml = '<div class="inline-row" style="margin-top:8px;"><label>Taille :</label>' +
                    '<input type="range" id="iconSize" min="20" max="45" value="24">' +
                    '<span id="iconSizeValue">24px</span></div>' +
                    '<div class="inline-row"><label>Couleur texte :</label>' +
                    '<input type="color" id="textColor" value="#FFFFFF"></div>' +
                    '<div class="inline-row"><label>Texte :</label>' +
                    '<input type="text" id="iconText" value="CFDT" maxlength="6" style="width:60px;"></div>';
                configSection.insertAdjacentHTML('afterend', sizeHtml);
            }
            
            chargerDonnees();
            initialiserCarte();
        });
    </script>
</body>
</html>
